<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Drop Text">
<meta name="theme-color" content="#f7f5f0">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Drop Text</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400&family=Instrument+Serif&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;background:#f7f5f0;transition:background .4s;}
canvas{position:fixed;inset:0;}
#hint,#btn-reset,#btn-mute,#btn-dark{
  font-family:'Noto Serif SC',Georgia,serif;
  font-size:14px;letter-spacing:2px;color:#c8c0b4;
  background:none;border:none;-webkit-tap-highlight-color:transparent;
}
#hint{position:fixed;bottom:calc(24px + env(safe-area-inset-bottom));left:50%;transform:translateX(-50%);pointer-events:none;transition:opacity .8s;white-space:nowrap;}
#btn-reset{position:fixed;bottom:calc(20px + env(safe-area-inset-bottom));cursor:pointer;}
#btn-reset:hover{color:#888;}
#btn-mute{position:fixed;bottom:calc(20px + env(safe-area-inset-bottom));cursor:pointer;}
#btn-mute:hover{color:#888;}
#btn-dark{position:fixed;top:20px;right:20px;cursor:pointer;}
#btn-dark:hover{color:#888;}
#title{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);font-family:'Instrument Serif',serif;font-size:clamp(28px,8vw,52px);color:#c8c0b4;pointer-events:none;letter-spacing:-0.02em;transition:opacity .6s;}
</style>
</head>
<body>
<canvas id="c"></canvas>
<canvas id="overlay" style="position:fixed;inset:0;width:100%;height:100%;pointer-events:none;z-index:50;mix-blend-mode:multiply;"></canvas>
<div id="hint">typing…</div>
<button id="btn-reset" onmousedown="event.preventDefault()" ontouchstart="event.stopPropagation()">reset</button>
<button id="btn-mute" onmousedown="event.preventDefault()" ontouchstart="event.stopPropagation()">sound</button>
<button id="btn-dark" onmousedown="event.preventDefault()" ontouchstart="event.stopPropagation()">B</button>
<div id="title">Drop Text</div>
<script src="https://cdn.jsdelivr.net/npm/matter-js@0.19.0/build/matter.min.js"></script>
<script>
(function(){
const { Engine, Bodies, Body, World, Mouse, MouseConstraint, Constraint } = Matter;
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const hint = document.getElementById('hint');

let W, H, floorY, prevFloorY;
const DPR = window.devicePixelRatio || 1;
const vv  = window.visualViewport;
function resize(){
  W = vv ? vv.width  : window.innerWidth;
  H = vv ? vv.height : window.innerHeight;
  const newFloorY = H - 28; // above bottom bar
  // shift all existing bodies by the same delta as floor
  if(prevFloorY && Math.abs(newFloorY - prevFloorY) > 5){
    const dy = newFloorY - prevFloorY;
    layers.forEach(l=>l.chars.forEach(({body})=>{
      Body.setPosition(body,{x:body.position.x, y:body.position.y + dy});
      Body.setVelocity(body,{x:0,y:0});
      Body.setAngularVelocity(body,0);
    }));
  }
  floorY = newFloorY;
  prevFloorY = floorY;
  canvas.width  = Math.round(W * DPR);
  canvas.height = Math.round(H * DPR);
  canvas.style.width  = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  rebuildWalls();
  alignButtons();
}
function alignButtons(){
  const px = Math.round(W * 0.1) + 'px';
  document.getElementById('btn-mute').style.left   = px;
  document.getElementById('btn-reset').style.right  = px;
}
if(vv){ vv.addEventListener('resize', resize); vv.addEventListener('scroll', resize); }
window.addEventListener('resize', resize);

const eng  = Engine.create({ gravity:{x:0,y:6}, enableSleeping:true });
const world = eng.world;
let floor, wL, wR;
function rebuildWalls(){
  if(floor) World.remove(world,[floor,wL,wR]);
  floor = Bodies.rectangle(W/2, floorY, W*3, 50, {isStatic:true,friction:12,restitution:0,frictionStatic:100,sleepThreshold:1});
  wL    = Bodies.rectangle(-30, H/2, 60, H*3, {isStatic:true});
  wR    = Bodies.rectangle(W+30, H/2, 60, H*3, {isStatic:true});
  World.add(world,[floor,wL,wR]);
}
resize();
window.addEventListener('resize', resize);

// ── Theme ──
const THEMES = {
  light: { bg:'#f7f5f0', ink:'#1e1a14', progress:'#b0a898', ui:'#c8c0b4', fakeBg:'#f7f5f0' },
  dark:  { bg:'#151311', ink:'#e8e4dc', progress:'#4a4640', ui:'#5a5652', fakeBg:'#151311' },
};
// modes: 0=明(light), 1=晴(light+sunny), 2=暗(dark)
const MODES = ['B','S','N'];
let modeIdx = 0;
let T = THEMES.light;
document.getElementById('btn-dark').addEventListener('click',()=>{
  modeIdx = (modeIdx + 1) % 3;
  if(modeIdx === 0){ T = THEMES.light; if(window._sunnySetFade) window._sunnySetFade(0); }
  if(modeIdx === 1){ T = THEMES.light; if(window._sunnySetFade) window._sunnySetFade(1); }
  if(modeIdx === 2){ T = THEMES.dark;  if(window._sunnySetFade) window._sunnySetFade(0); }
  document.body.style.background = T.bg;
  document.getElementById('btn-dark').textContent = MODES[modeIdx];
});

const FS    = 20;
const FONT  = `${FS}px 'Noto Serif SC',Georgia,serif`;
const PX    = Math.round(window.innerWidth * 0.1);
const PY    = 55;
const LH    = FS * 2.0;
const LIMIT = 80;
const mc    = document.createElement('canvas').getContext('2d');
mc.font     = FONT;
const NO_START = new Set('，。！？、：；」』）〕】〉》…—～'.split(''));
function charW(ch){ return mc.measureText(ch).width; }

function wrap(t){
  const maxW = W - PX*2;
  const ls = [''];
  for(const ch of t){
    if(ch==='\n'){ ls.push(''); continue; }
    const cur = ls[ls.length-1];
    if(mc.measureText(cur+ch).width < maxW) ls[ls.length-1]+=ch;
    else if(NO_START.has(ch)) ls[ls.length-1]+=ch;
    else ls.push(ch);
  }
  return ls;
}

let typed='', lines=[''], cpos=[];
let phase='typing'; // typing | shaking | dropping
let shakeTick=0, tick=0;
const layers=[];
let lockInput=false; // true during shaking+dropping

function buildCpos(){
  cpos=[];
  lines.forEach((line,li)=>{
    let x=PX;
    const y=PY+li*LH;
    for(const ch of line){
      const w=charW(ch);
      cpos.push({ch,x:x+w/2,y:y+FS*0.55,w});
      x+=w;
    }
  });
}

const titleEl = document.getElementById('title');
function update(){
  if(lockInput) return;
  lines=wrap(typed);
  buildCpos();
  // fade out title when user starts typing
  titleEl.style.opacity = typed.length > 0 ? '0' : '1';
  const charCount = typed.replace(/\s/g,'').length;
  const lineCount = lines.filter(l=>l.trim().length>0).length;
  if(charCount>=LIMIT || lineCount>=6){
    lockInput=true;
    phase='shaking'; shakeTick=0;
    hint.textContent='…';
    playThud();
    const snap=cpos.filter(p=>p.ch.trim());
    setTimeout(()=>startDrop(snap), 700);
  }
}

// ── Drop — all at once ──
function startDrop(snap){
  phase='dropping';
  hint.style.opacity='0';

  layers.forEach(l=>{ l.alpha=Math.max(0,l.alpha-0.25); });
  for(let i=layers.length-1;i>=0;i--){
    if(layers[i].alpha<=0){ layers[i].chars.forEach(c=>World.remove(world,c.body)); layers.splice(i,1); }
  }

  const N=snap.length;
  if(!N){ finishDrop(); return; }

  const bodies=[];
  const newChars=[];

  snap.forEach(({ch,x,y,w})=>{
    const b=Bodies.rectangle(x,y,w,FS*0.9,{
      restitution:0, friction:12, frictionAir:0.06, frictionStatic:100,
      sleepThreshold:3, angle:(Math.random()-0.5)*0.05,
    });
    Body.setVelocity(b,{x:(Math.random()-0.5)*3,y:0.5+Math.random()});
    b._ch=ch;
    World.add(world,b);
    bodies.push(b); newChars.push({body:b,ch});
  });

  for(let j=0;j<bodies.length-1;j++){
    World.add(world,Constraint.create({
      bodyA:bodies[j],bodyB:bodies[j+1],
      length:1,stiffness:0.08,damping:0.1
    }));
  }

  layers.push({chars:newChars,alpha:1.0,blur:0});
  finishDrop();
}

function finishDrop(){
  typed=''; lines=[''];cpos=[];
  phase='typing'; shakeTick=0;
  lockInput=false;
  setTimeout(()=>{ hint.style.opacity='1'; hint.textContent='keep writing…'; },900);
}

// ── Audio ──
const AC=window.AudioContext||window.webkitAudioContext;
let ac=null, muted=false;
function getAC(){ if(!ac) ac=new AC(); return ac; }
function playKey(){
  if(muted) return;
  try{
    const a=getAC(),dur=0.03;
    const buf=a.createBuffer(1,Math.floor(a.sampleRate*dur),a.sampleRate);
    const d=buf.getChannelData(0);
    for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,4);
    const src=a.createBufferSource(); src.buffer=buf;
    const g=a.createGain();
    g.gain.setValueAtTime(0.06+Math.random()*0.03,a.currentTime);
    g.gain.exponentialRampToValueAtTime(0.0001,a.currentTime+dur);
    const f=a.createBiquadFilter(); f.type='bandpass'; f.frequency.value=1800+Math.random()*1400; f.Q.value=1.2;
    src.connect(f); f.connect(g); g.connect(a.destination); src.start();
  }catch(e){}
}
function playThud(){
  if(muted) return;
  try{
    const a=getAC(),dur=0.14;
    const buf=a.createBuffer(1,Math.floor(a.sampleRate*dur),a.sampleRate);
    const d=buf.getChannelData(0);
    for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,2)*0.5;
    const src=a.createBufferSource(); src.buffer=buf;
    const g=a.createGain();
    g.gain.setValueAtTime(0.16,a.currentTime);
    g.gain.exponentialRampToValueAtTime(0.0001,a.currentTime+dur);
    const f=a.createBiquadFilter(); f.type='lowpass'; f.frequency.value=280;
    src.connect(f); f.connect(g); g.connect(a.destination); src.start();
  }catch(e){}
}
document.getElementById('btn-mute').addEventListener('click',()=>{
  muted=!muted;
  const b=document.getElementById('btn-mute');
  b.style.textDecoration=muted?'line-through':'none';
  b.style.color=muted?'#ddd':'';
});

// ── Input ──
const ime=document.createElement('textarea');
ime.style.cssText='position:fixed;top:-300px;left:0;width:200px;height:40px;opacity:0;font-size:16px;resize:none;';
ime.setAttribute('autocomplete','off'); ime.setAttribute('autocorrect','off');
ime.setAttribute('autocapitalize','off'); ime.setAttribute('spellcheck','false');
document.body.appendChild(ime);
window.addEventListener('click',()=>ime.focus());
let lastFocusTime=0;
let touchBody=null, touchOffset={x:0,y:0};

function findBodyNear(tx,ty){
  let best=null, bestD=Infinity;
  layers.forEach(layer=>{
    layer.chars.forEach(({body})=>{
      const dx=body.position.x-tx, dy=body.position.y-ty;
      const d=Math.sqrt(dx*dx+dy*dy);
      if(d<40&&d<bestD){ bestD=d; best=body; }
    });
  });
  return best;
}

window.addEventListener('touchstart',e=>{
  if(ac&&ac.state==='suspended') ac.resume();
  const t=e.touches[0];
  const near=findBodyNear(t.clientX, t.clientY);
  if(near){
    // dragging a char — don't focus keyboard
    touchBody=near;
    touchOffset={x:near.position.x-t.clientX, y:near.position.y-t.clientY};
  } else {
    lastFocusTime=Date.now(); ime.focus(); ime.value='';
  }
},{passive:true});

window.addEventListener('touchmove',e=>{
  if(!touchBody||e.touches.length!==1) return;
  const t=e.touches[0];
  Body.setPosition(touchBody,{x:t.clientX+touchOffset.x, y:t.clientY+touchOffset.y});
  Body.setVelocity(touchBody,{x:0,y:0});
},{passive:true});

window.addEventListener('touchend',()=>{ touchBody=null; },{passive:true});
ime.focus();

let composing=false;
ime.addEventListener('compositionstart',()=>{ composing=true; });
ime.addEventListener('compositionupdate',()=>{ playKey(); });
ime.addEventListener('compositionend',e=>{
  composing=false;
  const val=e.data||'';
  ime.value='';
  if(lockInput||!val) return;
  typed+=val; playKey(); update();
});
// English chars via input event (fires after compositionend so composing=false already)
ime.addEventListener('input',()=>{
  if(composing||lockInput) return;
  const val=ime.value;
  ime.value='';
  if(!val||val.length===0) return;
  typed+=val; playKey(); update();
});

window.addEventListener('keydown',e=>{
  if(lockInput) return;
  if(e.key==='Backspace'&&!composing){
    e.preventDefault();
    if(typed.length){ typed=typed.slice(0,-1); playKey(); update(); }
  } else if(e.key==='Enter'&&!composing){
    e.preventDefault();
    typed+='\n'; playKey(); update();
  }
  // single chars handled by input event — do NOT process here
});

// ── Reset ──
document.getElementById('btn-reset').addEventListener('click',()=>{
  layers.forEach(l=>l.chars.forEach(c=>World.remove(world,c.body)));
  layers.length=0;
  typed='';lines=[''];cpos=[];
  phase='typing';shakeTick=0;lockInput=false;
  ime.value='';composing=false;
  hint.style.opacity='1'; hint.textContent='type something…';
  titleEl.style.opacity='1';
});

// ── Mouse ──
const mouse=Mouse.create(canvas);
const mcon=MouseConstraint.create(eng,{mouse,constraint:{stiffness:0.12,damping:0.1,render:{visible:false}}});
World.add(world,mcon);
mouse.element.removeEventListener('mousewheel',mouse.mousewheel);

// ── Render ──
function draw(){
  requestAnimationFrame(draw);
  Engine.update(eng,1000/60);
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0); // ensure transform after any resize
  tick++;
  ctx.fillStyle=T.bg; ctx.fillRect(0,0,W,H);
  ctx.font=FONT; ctx.fillStyle=T.ink;
  ctx.textBaseline='middle'; ctx.textAlign='left';

  if(phase==='typing'||phase==='shaking'){
    shakeTick++;
    const shaking=phase==='shaking';
    cpos.forEach(({ch,x,y,w},i)=>{
      let dx=0,dy=0;
      if(shaking){
        const p=i/Math.max(cpos.length-1,1);
        const it=Math.pow(p,0.4)*shakeTick*0.35;
        dx=(Math.random()-0.5)*Math.min(it,9);
        dy=(Math.random()-0.5)*Math.min(it*0.5,4);
      }
      ctx.fillText(ch,x-w/2+dx,y+dy);
    });
    if(phase==='typing'){
      const lastLine = lines[lines.length-1];
      const last = cpos[cpos.length-1];
      let cx, cy;
      if(lastLine==='' || lastLine===undefined){
        // cursor at start of new empty line
        cx = PX;
        cy = PY + (lines.length-1)*LH + FS*0.55;
      } else {
        cx = last ? last.x+last.w/2+2 : PX;
        cy = last ? last.y : PY+FS*0.55;
      }
      if(Math.floor(tick/28)%2===0) ctx.fillRect(cx,cy-FS*0.4,1.5,FS*0.8);
    }
    const p=typed.replace(/\s/g,'').length/LIMIT;
    ctx.globalAlpha=0.07+p*0.13;
    ctx.fillStyle=T.progress;
    ctx.fillRect(0,0,W*p,1);
    ctx.globalAlpha=1; ctx.fillStyle=T.ink;
  }

  ctx.textAlign='center';
  layers.forEach(layer=>{
    const fade = 1 - layer.alpha; // 0=fresh, 1=gone
    layer.chars.forEach(({body,ch})=>{
      const {x,y}=body.position;
      if(y>H+100) return;
      ctx.save(); ctx.translate(x,y); ctx.rotate(body.angle);
      // base char at current alpha
      ctx.globalAlpha=layer.alpha; ctx.fillStyle=T.ink; ctx.font=FONT;
      ctx.fillText(ch,0,0);
      // fake blur: draw bg-colored copies offset in 4 directions, scaled with fade
      if(fade>0.1){
        const spread = Math.round(fade*5);
        ctx.globalAlpha=layer.alpha*fade*0.4; ctx.fillStyle=T.fakeBg;
        for(let s=1;s<=spread;s++){
          ctx.fillText(ch, s,0); ctx.fillText(ch,-s,0);
          ctx.fillText(ch,0, s); ctx.fillText(ch,0,-s);
        }
      }
      ctx.restore();
    });
  });
  ctx.globalAlpha=1; ctx.textAlign='left';

  layers.forEach(l=>{
    for(let i=l.chars.length-1;i>=0;i--){
      if(l.chars[i].body.position.y>H+300){ World.remove(world,l.chars[i].body); l.chars.splice(i,1); }
    }
  });
}
// wait for font before starting render loop to avoid flash of system font
document.fonts.ready.then(()=>{ mc.font = FONT; draw(); });
// ── Sunny overlay ──
(function(){
  const C=document.getElementById('overlay');
  const X=C.getContext('2d');
  let fadeVal=0,fadeTarget=0,lastTime=0;

  function fit(){ C.width=innerWidth; C.height=innerHeight; }
  addEventListener('resize',fit); fit();

  function lerp(a,b,t){return a+(b-a)*t;}
  function lc(a,b,t){return[Math.round(lerp(a[0],b[0],t)),Math.round(lerp(a[1],b[1],t)),Math.round(lerp(a[2],b[2],t))];}
  function getAnimTime(now){const p=(now%(120000*2))/120000;const tri=p<1?p:2-p;return tri*0.1;}
  function getAnimOpen(now){return 0.5+Math.sin(now*0.00006)*0.04+Math.sin(now*0.00015)*0.02;}
  const offscreenCache={};
  function getOff(key,w,h){const c=offscreenCache[key];if(c&&c.width===w&&c.height===h)return c;const nc=document.createElement('canvas');nc.width=w;nc.height=h;offscreenCache[key]=nc;return nc;}

  function draw(now){
    const dt=lastTime?(now-lastTime)/1000:0.016;lastTime=now;
    const speed=dt/1.8;
    const target=fadeTarget;
    if(fadeVal<target)fadeVal=Math.min(fadeVal+speed,1);
    else if(fadeVal>target)fadeVal=Math.max(fadeVal-speed,0);
    const fadeEase=fadeVal*fadeVal*(3-2*fadeVal);

    if(fadeVal===0&&target===0){X.clearRect(0,0,C.width,C.height);requestAnimationFrame(draw);return;}

    const w=C.width,h=C.height;
    const t=getAnimTime(now),open=getAnimOpen(now),n=t/0.35;
    const shadowTarget=lc([228,214,196],[234,224,210],n);
    const st=lc([255,255,255],shadowTarget,fadeEase);
    const wlTarget=lc([255,215,155],[255,230,190],n);
    const wl=lc([255,255,255],wlTarget,fadeEase);
    const skewX=lerp(0.34,0.26,n),skewY=lerp(0.13,0.09,n);
    const stretch=lerp(1.9,1.6,n);
    const warmAlpha=lerp(0.28,0.17,n)*fadeEase;
    const baseSoft=lerp(12,7,n);
    X.clearRect(0,0,w,h);
    X.fillStyle=`rgb(${st[0]},${st[1]},${st[2]})`;X.fillRect(0,0,w,h);
    const projW=Math.min(w*0.58,420)*stretch;
    const projH=Math.min(h*0.72,500)*stretch*0.78;
    const bx=Math.sin(now*0.00009)*5+Math.sin(now*0.00025)*2.5;
    const by=Math.cos(now*0.00011)*3.5+Math.cos(now*0.00022)*1.8;
    const px=lerp(w*0.01,w*0.06,n)+bx;
    const py=lerp(h*0.01,h*0.03,n)+by;
    const frameT=lerp(10,7,n);
    const numSlats=18,innerH=projH-frameT*2;
    const spacing=innerH/numSlats;
    const slatThick=spacing*lerp(0.88,0.12,open);
    const gapH=spacing-slatThick;
    if(gapH<0.3){requestAnimationFrame(draw);return;}
    X.save();X.translate(px,py);X.transform(1,skewY,skewX,1,0,0);
    const offW=Math.ceil(projW+80),offH=Math.ceil(projH+80);
    const OC=getOff('off',offW,offH),OX=OC.getContext('2d');
    OX.clearRect(0,0,offW,offH);
    for(let i=0;i<numSlats;i++){
      const baseY=frameT+i*spacing+slatThick;
      const wb=Math.sin(now*0.00008+i*0.53)*1.1+Math.sin(now*0.00019+i*0.79)*0.6;
      const sy=baseY+wb;
      const vertPos=i/numSlats,slatSoft=baseSoft*(0.55+vertPos*1.0);
      const distFromCenter=Math.abs(i-numSlats/2)/(numSlats/2);
      const slatAlpha=1.0-distFromCenter*0.1;
      const padY=slatSoft*1.2;
      const g=OX.createLinearGradient(0,sy-padY,0,sy+gapH+padY);
      g.addColorStop(0,'rgba(255,255,255,0)');
      g.addColorStop(padY/(gapH+padY*2),`rgba(255,255,255,${slatAlpha})`);
      g.addColorStop(1-padY/(gapH+padY*2),`rgba(255,255,255,${slatAlpha})`);
      g.addColorStop(1,'rgba(255,255,255,0)');
      OX.fillStyle=g;OX.fillRect(frameT,sy-padY,projW-frameT*2,gapH+padY*2);
    }
    OX.globalCompositeOperation='destination-in';
    const hV=OX.createLinearGradient(frameT,0,projW-frameT,0);
    hV.addColorStop(0,'rgba(255,255,255,0.1)');hV.addColorStop(0.06,'rgba(255,255,255,0.55)');
    hV.addColorStop(0.15,'rgba(255,255,255,1)');hV.addColorStop(0.5,'rgba(255,255,255,1)');
    hV.addColorStop(0.72,'rgba(255,255,255,0.8)');hV.addColorStop(0.85,'rgba(255,255,255,0.35)');
    hV.addColorStop(0.94,'rgba(255,255,255,0.12)');hV.addColorStop(1,'rgba(255,255,255,0.02)');
    OX.fillStyle=hV;OX.fillRect(0,0,offW,offH);
    const vV=OX.createLinearGradient(0,frameT,0,projH-frameT);
